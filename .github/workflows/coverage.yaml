# Workflow to run test coverage and upload to Codecov
# This runs without R CMD check to avoid triggering skip_on_cran()
# by setting NOT_CRAN=true environment variable

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: Test Coverage

permissions: read-all

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: actions/setup-python@v4
        id: setup-python
        with:
          python-version: '3.14'

      # Install the required Python package for lbugr
      - name: Install Python dependencies
        run: |
          pip install ladybug
        shell: bash

      # This step installs system libs for igraph/tidygraph and other dependencies
      - name: Install System Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::testthat
            any::reticulate
            any::igraph
            any::tidygraph

      - name: Install package
        run: |
          R CMD INSTALL .
        shell: bash

      - name: Verify package installation
        run: |
          Rscript -e "library(lbugr); print('Package loaded successfully')"
        shell: bash

      - name: Debug coverage environment
        run: |
          Rscript -e "
            print('R version:')
            print(R.version.string)
            print('Loaded packages:')
            print(search())
            print('covr available:')
            print('covr' %in% rownames(installed.packages()))
            ladybug_available <- reticulate::py_module_available('ladybug')
            print('ladybug available:')
            print(ladybug_available)
            if (!ladybug_available) {
              warning('ladybug Python package is not available')
            }
          "
        shell: bash

      - name: Run coverage
        run: |
          Rscript -e 'covr::codecov(quiet = FALSE)'
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
