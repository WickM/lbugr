# Workflow to run test coverage and upload to Codecov
# This runs without R CMD check to avoid triggering skip_on_cran()
# by setting NOT_CRAN=true environment variable

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: Test Coverage

permissions: read-all

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.14'

      - name: Create .Renviron for RETICULATE_PYTHON
        run: echo "RETICULATE_PYTHON=${{ steps.setup-python.outputs.python-path }}" > .Renviron
        shell: bash

      # The Python package name must match the R-CMD-check workflow.
      # "ladybug" on PyPI is an old CSV package (v0.0.2); "real_ladybug"
      # is the actual Ladybug graph-database client.
      - name: Install Python dependencies
        run: |
          pip install real_ladybug
        shell: bash

      # This step installs system libs for igraph/tidygraph and other dependencies
      - name: Install System Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::testthat
            any::reticulate
            any::igraph
            any::tidygraph

      - name: Install package
        run: |
          R CMD INSTALL .
        shell: bash

      - name: Verify package installation
        run: |
          Rscript -e "library(lbugr); print('Package loaded successfully')"
        shell: bash

      - name: Debug coverage environment
        run: |
          Rscript -e "
            print('R version:')
            print(R.version.string)
            print('Loaded packages:')
            print(search())
            print('covr available:')
            print('covr' %in% rownames(installed.packages()))
            cat('Python packages installed:\n')
            reticulate::py_run_string('import pkg_resources; [print(p.project_name) for p in pkg_resources.working_set]')
            ladybug_available <- reticulate::py_module_available('ladybug')
            print('ladybug available:')
            print(ladybug_available)
            if (!ladybug_available) {
              warning('ladybug Python package is not available')
            }
          "
        shell: bash

      - name: Run coverage
        run: |
          Rscript -e '
            # Run tests and generate coverage report
            cov <- covr::package_coverage()
            # Save XML report as artifact for debugging
            dir.create("coverage", showWarnings = FALSE)
            covr::to_cobertura(cov, file = "coverage/coverage.xml")
            # Upload to Codecov
            covr::codecov(quiet = FALSE)
          '
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Save coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
